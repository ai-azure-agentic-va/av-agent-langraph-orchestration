<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Long AI Conversations — Executive Briefing</title>
<style>
  :root{
    --page:#f4f6f9; --surface:#ffffff; --surface-2:#f6f8fb;
    --accent:#2a78d6; --accent-2:#6366f1; --accent-soft:#e8f1fc;
    --panel:#0f172a; --panel-2:#16223b; --on-panel:#f8fafc; --on-panel-2:#b9c3d6;
    --ink:#111827; --ink-2:#4b5563; --muted:#8a8f98;
    --hairline:rgba(17,24,39,.10); --hairline-2:rgba(17,24,39,.06);
    --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#d03b3b; --neutral:#98a2b3;
    --shadow-sm:0 1px 2px rgba(16,24,40,.05);
    --shadow:0 2px 4px rgba(16,24,40,.05), 0 12px 28px rgba(16,24,40,.08);
    --radius:16px; --radius-sm:11px;
    --font:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  html[data-theme="dark"]{
    --page:#0b0e14; --surface:#151a22; --surface-2:#1b212b;
    --accent:#3987e5; --accent-2:#818cf8; --accent-soft:rgba(57,135,229,.16);
    --panel:#0b1120; --panel-2:#111a2e; --on-panel:#f8fafc; --on-panel-2:#aab6cc;
    --ink:#f3f4f6; --ink-2:#c3c7cf; --muted:#8a8f98;
    --hairline:rgba(255,255,255,.12); --hairline-2:rgba(255,255,255,.07);
    --neutral:#8a94a6;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow:0 2px 4px rgba(0,0,0,.3), 0 12px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--page); color:var(--ink); font-family:var(--font);
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  /* ---------- stage ---------- */
  #viewport{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
  #stage{
    position:relative; width:1280px; height:720px;
    transform-origin:center center; will-change:transform;
  }
  .slide{
    position:absolute; inset:0; padding:60px 76px 62px;
    background:var(--surface); border-radius:22px; overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:var(--shadow);
    opacity:0; visibility:hidden; transform:translateY(10px);
    transition:opacity .34s ease, transform .34s ease, visibility .34s;
  }
  .slide.active{opacity:1; visibility:visible; transform:none;}
  html[data-reduced] .slide{transition:none!important;}
  /* ---------- shared type ---------- */
  .eyebrow{
    display:inline-flex; align-items:center; gap:9px;
    font-size:13px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--accent);
  }
  .eyebrow::before{content:""; width:22px; height:2px; border-radius:2px; background:var(--accent);}
  .slide h2{font-size:39px; line-height:1.1; letter-spacing:-.015em; margin:14px 0 0; font-weight:750; color:var(--ink);}
  .slide .sub{font-size:18px; color:var(--ink-2); margin:12px 0 0; line-height:1.5; max-width:60ch;}
  .body{flex:1; display:flex; flex-direction:column; min-height:0; margin-top:26px;}
  .footnote{margin-top:auto; padding-top:14px; font-size:12.5px; color:var(--muted);}
  .tnum{font-variant-numeric:tabular-nums;}
  /* ---------- panel (title / divider / closing) ---------- */
  .slide.panel{
    background:
      radial-gradient(1100px 520px at 82% -10%, rgba(99,102,241,.34), transparent 60%),
      radial-gradient(900px 480px at 8% 118%, rgba(42,120,214,.30), transparent 60%),
      linear-gradient(140deg, var(--panel) 0%, var(--panel-2) 100%);
    color:var(--on-panel);
  }
  .slide.panel h1,.slide.panel h2{color:var(--on-panel);}
  .slide.panel .eyebrow{color:#9db8ec;}
  .slide.panel .eyebrow::before{background:#9db8ec;}
  .slide.panel .sub{color:var(--on-panel-2); max-width:64ch;}
  .slide.panel .footnote{color:var(--on-panel-2); border-top:1px solid rgba(255,255,255,.14);}
  .title-h1{font-size:56px; line-height:1.06; letter-spacing:-.02em; font-weight:800; margin:20px 0 0; max-width:20ch;}
  /* ---------- cards ---------- */
  .grid{display:grid; gap:20px;}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g2{grid-template-columns:repeat(2,1fr);}
  .card{
    background:var(--surface); border:1px solid var(--hairline); border-radius:var(--radius);
    padding:24px 24px; box-shadow:var(--shadow-sm); display:flex; flex-direction:column; gap:9px;
  }
  .card .k{font-size:16.5px; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:10px;}
  .card .v{font-size:15px; line-height:1.5; color:var(--ink-2);}
  .card .dot{width:11px; height:11px; border-radius:50%; flex:none;}
  .card.tint{background:var(--accent-soft); border-color:transparent;}
  .card .cap{font-size:12px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--accent);}
  .bignum{font-size:46px; font-weight:800; line-height:1; letter-spacing:-.02em; color:var(--accent); font-variant-numeric:proportional-nums;}
  /* ---------- callout ---------- */
  .callout{
    margin-top:20px; background:var(--accent-soft); border-radius:var(--radius);
    padding:18px 22px; border-left:4px solid var(--accent);
  }
  .callout .k{font-size:13px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); margin-bottom:5px;}
  .callout .v{font-size:15.5px; line-height:1.5; color:var(--ink);}
  .callout.warn{background:color-mix(in srgb,var(--serious) 12%, transparent); border-left-color:var(--serious);}
  .callout.warn .k{color:var(--serious);}
  .callout ul{margin:6px 0 0; padding-left:18px;}
  .callout li{font-size:14.5px; line-height:1.55; color:var(--ink); margin:3px 0;}
  /* ---------- chips ---------- */
  .chip{
    display:inline-flex; align-items:center; gap:7px; padding:5px 12px; border-radius:999px;
    font-size:13px; font-weight:700; white-space:nowrap;
    background:var(--surface-2); color:var(--ink); border:1px solid var(--hairline);
  }
  .chip .dot{width:9px; height:9px; border-radius:50%; flex:none;}
  .g-favorable{--g:var(--good)}
  .g-moderate{--g:var(--warning)}
  .g-caution{--g:var(--serious)}
  .g-neutral{--g:var(--neutral)}
  .chip.grade{background:color-mix(in srgb,var(--g) 13%, var(--surface)); border-color:color-mix(in srgb,var(--g) 32%, transparent);}
  .chip.grade .dot{background:var(--g);}
  /* ---------- tables ---------- */
  table{border-collapse:separate; border-spacing:0; width:100%; font-size:14.5px;}
  thead th{
    text-align:left; font-size:12px; font-weight:800; letter-spacing:.07em; text-transform:uppercase;
    color:var(--muted); padding:0 14px 11px; border-bottom:1.5px solid var(--hairline);
  }
  tbody td{padding:13px 14px; border-bottom:1px solid var(--hairline-2); color:var(--ink-2); vertical-align:middle; line-height:1.4;}
  tbody tr:last-child td{border-bottom:none;}
  td.lead{color:var(--ink); font-weight:700; font-size:15px;}
  /* ---------- matrix ---------- */
  .matrix{margin-top:6px;}
  .matrix th{padding:0 10px 8px; text-align:center;}
  .matrix th.rowhdr{text-align:left;}
  .matrix td{padding:4px 8px; text-align:center; border-bottom:3px solid var(--surface);}
  .matrix td.method{text-align:left; font-weight:700; color:var(--ink); font-size:14px; padding-left:2px;}
  .cell{
    display:flex; align-items:center; justify-content:center; gap:7px;
    padding:6px 6px; border-radius:9px; font-size:12.5px; font-weight:650;
    color:var(--ink); background:color-mix(in srgb,var(--g) 15%, var(--surface));
  }
  .cell .dot{width:8px; height:8px; border-radius:50%; background:var(--g); flex:none;}
  .type-matrix h2{font-size:31px;}
  .type-matrix .body{margin-top:14px;}
  .legend{display:flex; gap:18px; flex-wrap:wrap; align-items:center; margin-top:10px; font-size:13px; color:var(--ink-2);}
  .legend .item{display:inline-flex; align-items:center; gap:7px;}
  .legend .sw{width:12px;height:12px;border-radius:4px;}
  .legend .note{margin-left:auto; color:var(--muted); font-style:italic;}
  /* ---------- lists / benefits ---------- */
  .checks{display:grid; grid-template-columns:1fr 1fr; gap:14px 32px; margin-top:8px;}
  .checks li{list-style:none; display:flex; gap:13px; align-items:flex-start; font-size:16.5px; line-height:1.45; color:var(--ink);}
  .checks .ic{flex:none; width:26px; height:26px; border-radius:50%; background:color-mix(in srgb,var(--good) 16%, var(--surface)); color:var(--good); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; margin-top:1px;}
  ul.plain{margin:0; padding:0;}
  /* ---------- dimensions (decide) ---------- */
  .dims{display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-top:6px;}
  .dim{background:var(--surface-2); border:1px solid var(--hairline); border-radius:var(--radius-sm); padding:18px 16px; display:flex; flex-direction:column; gap:8px;}
  .dim .n{width:34px;height:34px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;}
  .dim .k{font-size:16px;font-weight:750;color:var(--ink);}
  .dim .v{font-size:13px;line-height:1.45;color:var(--ink-2);}
  /* ---------- layers / roadmap ---------- */
  .layers{display:flex; flex-direction:column; gap:8px; margin-top:4px;}
  .layer{display:grid; grid-template-columns:46px 1fr 1.35fr auto; gap:18px; align-items:center;
    background:var(--surface); border:1px solid var(--hairline); border-radius:var(--radius-sm); padding:9px 18px; box-shadow:var(--shadow-sm);}
  .layer .ln{width:34px;height:34px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;}
  html[data-theme="dark"] .layer .ln{color:#0b1120;}
  .layer .what{font-size:16px;font-weight:700;color:var(--ink);}
  .layer .why{font-size:14px;color:var(--ink-2);line-height:1.4;}
  .roadmap{display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-top:8px;}
  .phase{background:var(--surface); border:1px solid var(--hairline); border-radius:var(--radius-sm); padding:18px 16px; box-shadow:var(--shadow-sm); display:flex; flex-direction:column; gap:10px; position:relative;}
  .phase .pn{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);}
  .phase .pk{font-size:15.5px;font-weight:750;color:var(--ink);line-height:1.2;}
  .phase .ps{font-size:13px;color:var(--ink-2);line-height:1.45;}
  .phase .pw{font-size:12.5px;color:var(--muted);line-height:1.4;margin-top:auto;padding-top:8px;border-top:1px dashed var(--hairline);}
  /* ---------- closing ---------- */
  .badge{display:inline-flex;align-items:center;gap:9px;background:rgba(12,163,12,.18);color:#8ff0a6;border:1px solid rgba(12,163,12,.45);
    padding:7px 16px;border-radius:999px;font-weight:800;letter-spacing:.1em;font-size:13px;text-transform:uppercase;}
  .closing-lead{font-size:29px;line-height:1.32;font-weight:600;color:var(--on-panel);margin:22px 0 0;max-width:34ch;letter-spacing:-.01em;}
  /* ---------- chrome (fixed, unscaled) ---------- */
  #bar{position:fixed;top:0;left:0;height:3px;background:var(--accent);width:0;z-index:40;transition:width .3s ease;}
  html[data-reduced] #bar{transition:none;}
  #toolbar{position:fixed;top:16px;right:18px;display:flex;gap:8px;z-index:45;}
  #nav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;z-index:45;
    background:var(--surface);border:1px solid var(--hairline);border-radius:999px;padding:6px 8px;box-shadow:var(--shadow);}
  .btn{appearance:none;border:1px solid var(--hairline);background:var(--surface);color:var(--ink);cursor:pointer;
    width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;}
  .btn:hover{background:var(--surface-2);border-color:var(--accent);}
  .btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
  #nav .btn{border:none;background:transparent;}
  #nav .btn:hover{background:var(--surface-2);}
  #counter{font-size:13.5px;font-weight:700;color:var(--ink-2);min-width:58px;text-align:center;font-variant-numeric:tabular-nums;}
  #toolbar .btn{box-shadow:var(--shadow-sm);}
  /* ---------- overview ---------- */
  #overview{position:fixed;inset:0;z-index:60;background:color-mix(in srgb,var(--page) 88%, transparent);
    backdrop-filter:blur(6px);display:none;padding:56px 60px;overflow:auto;}
  #overview.open{display:block;}
  #overview h3{margin:0 0 6px;font-size:22px;color:var(--ink);}
  #overview p{margin:0 0 24px;color:var(--muted);font-size:14px;}
  .ov-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .ov{background:var(--surface);border:1px solid var(--hairline);border-radius:12px;padding:16px;cursor:pointer;text-align:left;
    display:flex;flex-direction:column;gap:8px;min-height:96px;transition:border-color .15s,transform .1s;box-shadow:var(--shadow-sm);}
  .ov:hover{border-color:var(--accent);transform:translateY(-2px);}
  .ov:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .ov .oi{font-size:12px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;}
  .ov .ot{font-size:14.5px;font-weight:650;color:var(--ink);line-height:1.3;}
  .ov .oa{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:auto;}
  .hint{position:fixed;bottom:20px;right:20px;z-index:45;font-size:12px;color:var(--muted);}
  /* ---------- responsive nudge ---------- */
  @media (max-width:640px){ .slide{padding:34px 30px;} }
  /* ---------- print ---------- */
  @media print{
    @page{size:1280px 720px;margin:0;}
    html,body{overflow:visible;background:#fff;}
    html{data-theme:light;}
    #bar,#toolbar,#nav,#overview,.hint{display:none!important;}
    #viewport{position:static;display:block;}
    #stage{position:static;width:1280px;height:auto;transform:none!important;}
    .slide{position:static;opacity:1!important;visibility:visible!important;transform:none!important;
      width:1280px;height:720px;border-radius:0;box-shadow:none;page-break-after:always;break-after:page;overflow:hidden;
      border:1px solid #e5e7eb;}
    .slide.panel{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
</style>
</head>
<body>
<div id="bar"></div>

<div id="toolbar">
  <button class="btn" id="themeBtn" aria-label="Toggle light or dark theme" title="Theme"></button>
  <button class="btn" id="ovBtn" aria-label="Toggle slide overview" title="Overview (O)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
  </button>
  <button class="btn" id="printBtn" aria-label="Print or save as PDF" title="Print / PDF">
    <svg viewBox="0 0 24 24"><path d="M6 9V3h12v6"/><rect x="6" y="13" width="12" height="8" rx="1"/><path d="M6 17H4a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-2"/></svg>
  </button>
</div>

<div id="viewport"><div id="stage" aria-live="polite"></div></div>

<nav id="nav" aria-label="Slide navigation">
  <button class="btn" id="prevBtn" aria-label="Previous slide"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></button>
  <span id="counter" aria-live="polite">1 / 1</span>
  <button class="btn" id="nextBtn" aria-label="Next slide"><svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></button>
</nav>

<div id="overview" role="dialog" aria-modal="true" aria-label="Slide overview">
  <h3>All slides</h3>
  <p>Click any slide to jump to it. Press O or Esc to close.</p>
  <div class="ov-grid" id="ovGrid"></div>
</div>

<div class="hint" id="hint">← → to navigate · O for overview</div>

<script>
"use strict";
/* ============ CONTENT ============ */
var META = "Updated Jul 7, 2026";

var SLIDES = [
  { type:"title", act:"", nav:"Title",
    eyebrow:"Executive Briefing",
    title:"Keeping Long AI Conversations Fast, Reliable &amp; Cost-Controlled",
    sub:"" },

  { type:"tldr", act:"In one minute", nav:"The headline",
    title:"The headline",
    cards:[
      { k:"Core issue", g:"caution", v:"Long chats get slower, costlier, and less reliable as they grow." },
      { k:"Recommendation", g:"favorable", v:"Use a layered defense summarize, cap, recall, and measure." },
      { k:"Decision needed", g:"neutral", v:"Approve a phased approach and the success metrics to track it." }
    ] },

  { type:"statement", act:"The problem", nav:"The problem",
    title:"Why long conversations get harder",
    lead:"An AI conversation is like a meeting with a growing transcript. At the start the assistant can focus. As the transcript grows, every new turn forces it to carry more history so responses slow down, cost more, and important older details get harder to use.",
    callout:{ k:"Management takeaway", v:"This is not only a technical optimization. It affects user experience, infrastructure cost, reliability, and our ability to scale long-running workflows." } },

  { type:"impact", act:"The problem", nav:"Why it matters",
    title:"Why it matters to the business",
    cards:[
      { cap:"User experience", k:"Trust &amp; retention", v:"Long conversations feel slower. Delays reduce trust and increase abandonment." },
      { cap:"Cost management", k:"Spend per turn", v:"The longer the history, the more input the model processes on every single turn." },
      { cap:"Answer quality", k:"Accuracy", v:"Too much context dilutes attention and makes important older details harder to use." }
    ] },

  { type:"foundation", act:"The problem", nav:"What we already have",
    title:"We are not starting from zero",
    intro:"The feat/trust branch already includes core controls for long conversations — so the next investment is incremental, not a rebuild.",
    items:[
      { k:"Automatic compaction", v:"When a chat gets large, older content is summarized and recent turns stay in full." },
      { k:"History offload", v:"The full older history is saved to a database, so nothing is permanently lost." },
      { k:"Prompt caching", v:"Repeated, stable context is reused more efficiently to cut cost and latency." },
      { k:"Token observability", v:"The system already records token usage, so improvements can be measured." }
    ],
    callout:{ k:"Key implication", v:"Because the foundation exists, the smart move is to tune, protect, and measure before adding new infrastructure." } },

  { type:"decide", act:"The decision", nav:"What you're deciding",
    title:"What leaders are deciding",
    intro:"There is no single perfect method. Each option trades off five things — the decision is which trade-off best fits our product and operating model.",
    dims:[
      { k:"Speed", v:"How much faster long chats feel." },
      { k:"Cost", v:"How much repeated context we avoid." },
      { k:"Recall", v:"Whether old details can still be used." },
      { k:"Reliability", v:"Whether we avoid hard context limits." },
      { k:"Complexity", v:"How much new work is required." }
    ] },

  { type:"optionmap", act:"The options", nav:"Options at a glance",
    title:"The options at a glance",
    rows:[
      { f:"Summarization", b:"Balanced control with continuity", d:"Can lose detail if summaries are weak", e:"Low–Med", g:"favorable" },
      { f:"Sliding window", b:"A hard size limit", d:"Drops older context abruptly", e:"Low", g:"favorable" },
      { f:"Selective retention", b:"Reducing tool / search bloat", d:"May remove facts needed later", e:"Med", g:"moderate" },
      { f:"Session boundary", b:"A clear, user-controlled reset", d:"Adds UX friction", e:"Med", g:"moderate" },
      { f:"Offloaded recall", b:"Recovering old details on demand", d:"Model must know when to look", e:"Low", g:"favorable" },
      { f:"Vector retrieval", b:"Large history with targeted recall", d:"More infra, cost, and misses", e:"High", g:"caution" },
      { f:"Context isolation", b:"Keeping heavy work out of the main chat", d:"Architectural complexity", e:"Med–High", g:"caution" },
      { f:"Caching / model knobs", b:"Reducing pain without changing history", d:"Doesn’t solve recall or hard limits", e:"Low", g:"favorable" }
    ] },




  { type:"layers", act:"The plan", nav:"Layered defense",
    title:"Recommended: a layered defense",
    intro:"No single tactic solves latency, cost, quality, hard limits, and recall at once. Each layer addresses a different risk.",
    rows:[
      { what:"Tune existing summarization", why:"Compress earlier; keep the most useful recent context.", e:"Low", g:"favorable" },
      { what:"Add a message-count trigger", why:"Catch long chats made of many small turns.", e:"Low", g:"favorable" },
      { what:"Add a sliding-window safety floor", why:"Guarantee the chat can’t grow toward the model limit.", e:"Low", g:"favorable" },
      { what:"Use offloaded history for recall", why:"Let the assistant retrieve older details when asked.", e:"Low", g:"favorable" },
      { what:"Add a soft session nudge (later)", why:"Offer a clean start only if metrics show sessions still run long.", e:"Medium", g:"moderate" }
    ] },

  { type:"benefits", act:"The plan", nav:"Expected benefits",
    title:"What we expect to gain",
    items:[
      "Lower latency for long-running conversations.",
      "Better cost control by reducing repeated large prefills.",
      "Lower risk of hitting model context limits.",
      "Better answer quality by keeping the active context focused.",
      "Preserved ability to recover older details when needed."
    ] },

  
  { type:"decisions", act:"The decision", nav:"Decisions needed",
    title:"Decisions we need from leadership",
    rows:[
      { a:"Cost &amp; latency target", q:"What response-time and cost profile is acceptable for long conversations?" },
      { a:"Recall expectation", q:"Must the assistant reliably remember IDs, paths, and decisions from 20+ turns ago?" },
      { a:"Session length reality", q:"Are users running 20–40 turn chats, or must we design for 100+ turns?" },
      { a:"Frontend capacity", q:"Is there appetite for a user-facing session nudge if backend controls aren’t enough?" },
      { a:"Scope boundary", q:"Is persistent cross-session memory in scope, or a separate roadmap item?" }
    ] },

  { type:"glossary", act:"Appendix", nav:"Glossary",
    title:"Plain-English glossary",
    rows:[
      { t:"Context", d:"The conversation history and supporting information the model receives." },
      { t:"Compaction / summarization", d:"Replacing older detailed history with a shorter summary." },
      { t:"Sliding window", d:"Keeping only the most recent portion of the conversation." },
      { t:"Tool output", d:"Large results from search, documents, systems, or integrations." },
      { t:"Offloaded history", d:"Older full history saved outside the active prompt so it can be reopened later." }
    ] }
];

/* ============ RENDER ============ */
function actTag(act){ return act ? '<span class="eyebrow">'+act+'</span>' : ''; }
function head(s){ return actTag(s.act) + '<h2>'+s.title+'</h2>' + (s.intro?'<p class="sub">'+s.intro+'</p>':''); }

var T = {
  title:function(s){
    return '<div class="eyebrow">'+s.eyebrow+'</div>'+
      '<h1 class="title-h1">'+s.title+'</h1>'+
      '<p class="sub">'+s.sub+'</p>'+
      '<div class="footnote">'+META+'</div>';
  },
  tldr:function(s){
    var c = s.cards.map(function(x){
      return '<div class="card"><div class="k"><span class="dot g-'+x.g+'" style="background:var(--g)"></span>'+x.k+'</div><div class="v">'+x.v+'</div></div>';
    }).join('');
    return head(s)+'<div class="body"><div class="grid g3" style="margin-top:6px">'+c+'</div></div>';
  },
  statement:function(s){
    return head(s)+'<div class="body"><p style="font-size:26px;line-height:1.42;color:var(--ink);font-weight:500;max-width:40ch;letter-spacing:-.01em;margin:4px 0 0">'+s.lead+'</p>'+
      '<div class="callout"><div class="k">'+s.callout.k+'</div><div class="v">'+s.callout.v+'</div></div></div>';
  },
  impact:function(s){
    var c = s.cards.map(function(x){
      return '<div class="card"><div class="cap">'+x.cap+'</div><div class="k">'+x.k+'</div><div class="v">'+x.v+'</div></div>';
    }).join('');
    return head(s)+'<div class="body"><div class="grid g3">'+c+'</div></div>';
  },
  foundation:function(s){
    var c = s.items.map(function(x){
      return '<div class="card"><div class="k"><span class="dot" style="background:var(--good)"></span>'+x.k+'</div><div class="v">'+x.v+'</div></div>';
    }).join('');
    return head(s)+'<div class="body"><div class="grid g2">'+c+'</div><div class="callout"><div class="k">'+s.callout.k+'</div><div class="v">'+s.callout.v+'</div></div></div>';
  },
  decide:function(s){
    var d = s.dims.map(function(x,i){
      return '<div class="dim"><div class="n">'+(i+1)+'</div><div class="k">'+x.k+'</div><div class="v">'+x.v+'</div></div>';
    }).join('');
    return head(s)+'<div class="body" style="justify-content:center"><div class="dims">'+d+'</div></div>';
  },
  optionmap:function(s){
    var r = s.rows.map(function(x){
      return '<tr><td class="lead">'+x.f+'</td><td>'+x.b+'</td><td>'+x.d+'</td>'+
        '<td><span class="chip grade g-'+x.g+'"><span class="dot"></span>'+x.e+'</span></td></tr>';
    }).join('');
    return head(s)+'<div class="body"><table><thead><tr><th>Method family</th><th>Best for</th><th>Main drawback</th><th>Effort</th></tr></thead><tbody>'+r+'</tbody></table></div>';
  },
  choices:function(s){
    var r = s.rows.map(function(x){
      return '<tr><td class="lead" style="width:31%">'+x.c+'</td>'+
        '<td style="width:16%"><span class="chip grade g-'+x.g+'"><span class="dot"></span>'+x.r+'</span></td>'+
        '<td>'+x.v+'</td></tr>';
    }).join('');
    var b = s.callout.bullets.map(function(t){ return '<li>'+t+'</li>'; }).join('');
    return head(s)+'<div class="body"><table><thead><tr><th>Choice</th><th>Risk / effort</th><th>Management readout</th></tr></thead><tbody>'+r+'</tbody></table>'+
      '<div class="callout warn"><div class="k">'+s.callout.k+'</div><ul>'+b+'</ul></div></div>';
  },
  matrix:function(s){
    var th = s.cols.map(function(c){ return '<th>'+c+'</th>'; }).join('');
    var body = s.rows.map(function(row){
      var cells = row.c.map(function(cell){
        return '<td><div class="cell g-'+cell[1]+'"><span class="dot"></span>'+cell[0]+'</div></td>';
      }).join('');
      return '<tr><td class="method">'+row.m+'</td>'+cells+'</tr>';
    }).join('');
    var legend = '<div class="legend">'+
      '<span class="item"><span class="sw" style="background:var(--good)"></span>Favorable</span>'+
      '<span class="item"><span class="sw" style="background:var(--warning)"></span>Moderate</span>'+
      '<span class="item"><span class="sw" style="background:var(--serious)"></span>Caution</span>'+
      '<span class="item"><span class="sw" style="background:var(--neutral)"></span>Neutral</span>'+
      '<span class="note">'+s.note+'</span></div>';
    return head(s)+'<div class="body"><table class="matrix tnum"><thead><tr><th class="rowhdr">Method</th>'+th+'</tr></thead><tbody>'+body+'</tbody></table>'+legend+'</div>';
  },
  interpret:function(s){
    var c = s.cards.map(function(x){
      return '<div class="card"><div class="k"><span class="dot g-'+x.g+'" style="background:var(--g)"></span>'+x.k+'</div><div class="v">'+x.v+'</div></div>';
    }).join('');
    return head(s)+'<div class="body"><div class="grid g3" style="grid-template-rows:1fr 1fr">'+c+'</div></div>';
  },
  layers:function(s){
    var r = s.rows.map(function(x,i){
      return '<div class="layer"><div class="ln">'+(i+1)+'</div><div class="what">'+x.what+'</div><div class="why">'+x.why+'</div>'+
        '<span class="chip grade g-'+x.g+'"><span class="dot"></span>'+x.e+'</span></div>';
    }).join('');
    return head(s)+'<div class="body"><div class="layers">'+r+'</div></div>';
  },
  benefits:function(s){
    var li = s.items.map(function(t){ return '<li><span class="ic">✓</span><span>'+t+'</span></li>'; }).join('');
    return head(s)+'<div class="body" style="justify-content:center"><ul class="plain checks">'+li+'</ul></div>';
  },
  roadmap:function(s){
    var p = s.phases.map(function(x){
      return '<div class="phase"><div class="pn">'+x.n+'</div><div class="pk">'+x.k+'</div><div class="ps">'+x.s+'</div><div class="pw">'+x.w+'</div></div>';
    }).join('');
    return head(s)+'<div class="body"><div class="roadmap">'+p+'</div></div>';
  },
  metrics:function(s){
    var li = s.items.map(function(t,i){
      return '<div class="card" style="flex-direction:row;align-items:center;gap:16px;padding:16px 20px"><div class="bignum" style="font-size:32px;min-width:44px">'+(i+1)+'</div><div class="v" style="font-size:16px;color:var(--ink)">'+t+'</div></div>';
    }).join('');
    return head(s)+'<div class="body"><div class="grid" style="grid-template-columns:1fr 1fr;gap:12px">'+li+'</div>'+
      '<div class="callout"><div class="k">'+s.callout.k+'</div><div class="v">'+s.callout.v+'</div></div></div>';
  },
  decisions:function(s){
    var r = s.rows.map(function(x,i){
      return '<tr><td style="width:52px"><div class="bignum" style="font-size:24px">'+(i+1)+'</div></td><td class="lead" style="width:28%">'+x.a+'</td><td>'+x.q+'</td></tr>';
    }).join('');
    return head(s)+'<div class="body"><table><thead><tr><th></th><th>Decision area</th><th>Question for leadership</th></tr></thead><tbody>'+r+'</tbody></table></div>';
  },
  closing:function(s){
    return '<div class="eyebrow">'+s.eyebrow+'</div>'+
      '<div style="margin:18px 0 0"><span class="badge">✓ '+s.badge+'</span></div>'+
      '<p class="closing-lead">'+s.lead+'</p>'+
      '<div class="footnote">'+META+'</div>';
  },
  glossary:function(s){
    var r = s.rows.map(function(x){
      return '<tr><td class="lead" style="width:32%">'+x.t+'</td><td>'+x.d+'</td></tr>';
    }).join('');
    return head(s)+'<div class="body" style="justify-content:center"><table><tbody>'+r+'</tbody></table></div>';
  }
};

/* ============ ENGINE ============ */
var stage = document.getElementById('stage');
var total = SLIDES.length, cur = 0;

SLIDES.forEach(function(s, i){
  var el = document.createElement('section');
  el.className = 'slide ' + s.type + ((s.type==='title'||s.type==='closing') ? ' panel':'');
  el.setAttribute('role','group');
  el.setAttribute('aria-roledescription','slide');
  el.setAttribute('aria-label',(i+1)+' of '+total+': '+(s.nav||s.title||''));
  el.dataset.index = i;
  el.innerHTML = T[s.type](s);
  stage.appendChild(el);
});
var slideEls = Array.prototype.slice.call(stage.children);

function scale(){
  var pad = 46, chrome = 96;
  var sc = Math.min((window.innerWidth - pad*2)/1280, (window.innerHeight - chrome)/720);
  sc = Math.max(0.2, Math.min(sc, 1.35));
  stage.style.transform = 'scale('+sc+')';
}

function render(){
  slideEls.forEach(function(el, i){ el.classList.toggle('active', i===cur); });
  document.getElementById('counter').textContent = (cur+1)+' / '+total;
  document.getElementById('bar').style.width = (total>1 ? (cur/(total-1))*100 : 100)+'%';
  document.getElementById('prevBtn').disabled = (cur===0);
  document.getElementById('nextBtn').disabled = (cur===total-1);
  if(('#'+cur) !== location.hash) history.replaceState(null,'','#'+cur);
}
function go(i){ cur = Math.max(0, Math.min(total-1, i)); render(); }
function next(){ go(cur+1); }
function prev(){ go(cur-1); }

/* nav + keyboard */
document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
window.addEventListener('keydown', function(e){
  if(document.getElementById('overview').classList.contains('open')){
    if(e.key==='Escape'||e.key==='o'||e.key==='O'){ toggleOv(); e.preventDefault(); }
    return;
  }
  switch(e.key){
    case 'ArrowRight': case 'PageDown': next(); e.preventDefault(); break;
    case 'ArrowLeft': case 'PageUp': prev(); e.preventDefault(); break;
    case ' ': e.shiftKey ? prev() : next(); e.preventDefault(); break;
    case 'Home': go(0); e.preventDefault(); break;
    case 'End': go(total-1); e.preventDefault(); break;
    case 'o': case 'O': case 'Escape': toggleOv(); e.preventDefault(); break;
  }
});

/* theme */
var root = document.documentElement;
var SUN = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
var MOON = '<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
function applyTheme(t){ root.setAttribute('data-theme', t); document.getElementById('themeBtn').innerHTML = (t==='dark'?SUN:MOON); }
function initTheme(){
  var saved=null; try{ saved = localStorage.getItem('lc-theme'); }catch(e){}
  if(!saved){ saved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark':'light'; }
  applyTheme(saved);
}
document.getElementById('themeBtn').addEventListener('click', function(){
  var t = root.getAttribute('data-theme')==='dark' ? 'light':'dark';
  applyTheme(t); try{ localStorage.setItem('lc-theme', t); }catch(e){}
});
if(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches){ root.setAttribute('data-reduced',''); }

/* print */
document.getElementById('printBtn').addEventListener('click', function(){ window.print(); });

/* overview */
var ovGrid = document.getElementById('ovGrid');
SLIDES.forEach(function(s, i){
  var b = document.createElement('button');
  b.className = 'ov'; b.type='button';
  b.innerHTML = '<div class="oi">'+(i+1<10?'0':'')+(i+1)+'</div><div class="ot">'+(s.nav||s.title||'')+'</div><div class="oa">'+(s.act||'&nbsp;')+'</div>';
  b.addEventListener('click', function(){ go(i); toggleOv(); });
  ovGrid.appendChild(b);
});
function toggleOv(){
  var ov = document.getElementById('overview');
  var open = ov.classList.toggle('open');
  document.getElementById('ovBtn').setAttribute('aria-expanded', open?'true':'false');
  if(open){ var f=ovGrid.children[cur]; if(f) f.focus(); }
}
document.getElementById('ovBtn').addEventListener('click', toggleOv);
document.getElementById('overview').addEventListener('click', function(e){ if(e.target===this) toggleOv(); });

/* hash + resize */
window.addEventListener('hashchange', function(){
  var i = parseInt((location.hash||'').slice(1),10);
  if(!isNaN(i) && i!==cur) go(i);
});
window.addEventListener('resize', scale);

/* boot */
(function(){
  initTheme();
  var i = parseInt((location.hash||'').slice(1),10);
  if(!isNaN(i)) cur = Math.max(0, Math.min(total-1, i));
  scale(); render();
  setTimeout(function(){ var h=document.getElementById('hint'); if(h) h.style.opacity='0'; h.style.transition='opacity .8s'; }, 4200);
})();
</script>
</body>
